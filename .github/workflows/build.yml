name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build (Windows, Release)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore NeoTreescan.sln

      - name: Build (Release)
        run: dotnet build NeoTreescan.sln -c Release --no-restore /warnaserror

      - name: Publish single-file EXE
        run: >
          dotnet publish src/NeoTreescan.App/NeoTreescan.App.csproj
          -c Release
          --no-build
          -o artifacts/publish

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: NeoTreescan-win-x64
          path: artifacts/publish/NeoTreescan.exe
          retention-days: 14
