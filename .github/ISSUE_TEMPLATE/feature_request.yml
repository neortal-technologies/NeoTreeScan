name: Feature request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for proposing a feature. Please describe the use case first,
        then the proposed implementation. Feature requests backed by a PR
        move faster than ones that are not.

  - type: textarea
    id: problem
    attributes:
      label: Problem / use case
      description: What are you trying to do? Why does the current app not let you do it?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How should it work? UI sketches, screenshots, or mockups welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other ways you thought about solving this, and why they are worse.
    validations:
      required: false

  - type: dropdown
    id: pr
    attributes:
      label: Are you willing to contribute a PR?
      options:
        - "Yes, I will open a PR"
        - "Maybe, with guidance"
        - "No, just requesting"
    validations:
      required: true
